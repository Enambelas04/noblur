# ─────────────────────────────────────────────
#  NoBlur — Nginx config
#  Ganti YOUR_DOMAIN dengan domain atau IP VPS
# ─────────────────────────────────────────────

# Redirect HTTP → HTTPS (aktifkan jika sudah punya SSL)
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

# HTTP (development / belum punya SSL)
server {
    listen 80;
    server_name YOUR_DOMAIN;   # ganti dengan IP atau domain kamu

    # Batas ukuran upload — sesuaikan dengan MAX_FILE_SIZE
    client_max_body_size 2G;

    # Timeout lebih panjang untuk file besar
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass         http://noblur:3000;
        proxy_http_version 1.1;

        # WebSocket — dibutuhkan untuk Next.js hot reload
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets Next.js (_next/static)
    location /_next/static/ {
        proxy_pass http://noblur:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

