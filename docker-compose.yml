version: '3.8'

services:
  noblur:
    build: .
    # Port 3000 tidak dibuka ke luar — Nginx yang jadi pintu masuk
    expose:
      - "3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    command: npm run dev
    restart: unless-stopped
    networks:
      - noblur_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro       # taruh cert SSL di sini (opsional)
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - noblur
    restart: unless-stopped
    networks:
      - noblur_net

networks:
  noblur_net:
    driver: bridge
