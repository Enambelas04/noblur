server {
    listen 80;
    server_name yourdomain.com;

    # tambah ini — batas ukuran file 2GB (NoBlur proses client-side,
    # tapi tetap perlu kalau nanti ada fitur upload)
    client_max_body_size 2G;

    # tambah ini — timeout untuk koneksi lambat
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass http://noblur:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # tambah ini — agar Next.js tahu IP asli user
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # tambah ini — cache static file Next.js agar lebih cepat
    location /_next/static/ {
        proxy_pass http://noblur:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}